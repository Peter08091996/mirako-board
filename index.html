<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mirako - 任务看板</title>
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Patrick Hand', 'Comic Sans MS', cursive;
      background-color: #f7f6f2;
      color: #1a1a1a;
      background-image:
        radial-gradient(#dcdcdc 1.2px, transparent 1.2px),
        radial-gradient(#dcdcdc 1.2px, transparent 1.2px);
      background-size: 24px 24px;
      background-position: 0 0, 12px 12px;
    }

    .sketch-box {
      border: 2px solid #1a1a1a;
      border-radius: 2px 255px 5px 25px / 255px 5px 225px 5px;
      background: #fff;
    }
    .sketch-box-alt {
      border: 2px solid #1a1a1a;
      border-radius: 255px 5px 225px 5px / 5px 225px 5px 255px;
      background: #fff;
    }

    .page { display: none; }
    .page.active { display: block; }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    /* 登录页 */
    .login-wrap {
      max-width: 400px;
      margin: 10vh auto 0;
      padding: 32px;
    }
    .login-wrap h1 {
      font-size: 2.8rem;
      text-align: center;
      margin-bottom: 28px;
      transform: rotate(-1.2deg);
      letter-spacing: 3px;
    }
    .login-wrap label {
      display: block;
      margin: 14px 0 6px;
      font-size: 1.1rem;
    }
    .login-wrap input {
      width: 100%;
      padding: 10px;
      font-family: inherit;
      font-size: 1.15rem;
      border: 2px solid #1a1a1a;
      background: #fff;
      outline: none;
    }
    .login-wrap button {
      width: 100%;
      margin-top: 22px;
      padding: 12px;
      font-family: inherit;
      font-size: 1.2rem;
      border: 2px solid #1a1a1a;
      background: #1a1a1a;
      color: #fff;
      cursor: pointer;
      transform: rotate(-0.5deg);
    }
    .login-wrap button:hover {
      opacity: 0.9;
      transform: rotate(0deg);
    }
    .login-tip {
      margin-top: 18px;
      font-size: 0.95rem;
      color: #444;
      line-height: 1.5;
    }
    .login-error {
      margin-top: 12px;
      color: #900;
      font-size: 1rem;
    }

    /* 看板头部 */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 3px solid #1a1a1a;
      transform: rotate(-0.3deg);
      flex-wrap: wrap;
      gap: 12px;
    }
    header h1 {
      margin: 0;
      font-size: 2.6rem;
      letter-spacing: 3px;
      transform: rotate(-1.2deg);
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .members {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .member-avatar {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      font-weight: bold;
      font-size: 1.2rem;
      cursor: pointer;
      user-select: none;
      transition: transform 0.12s;
      position: relative;
    }
    .member-avatar:hover {
      transform: scale(1.08) rotate(4deg);
    }
    .member-avatar.active {
      background: #1a1a1a;
      color: #fff;
    }
    .logout-btn {
      padding: 6px 12px;
      font-family: inherit;
      font-size: 1rem;
      border: 2px solid #1a1a1a;
      background: transparent;
      cursor: pointer;
    }
    .logout-btn:hover {
      background: rgba(0,0,0,0.08);
    }
    .clear-filter {
      font-size: 1rem;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-style: wavy;
      margin-left: 6px;
      opacity: 0.8;
    }
    .clear-filter:hover { opacity: 1; }
    .net-status {
      font-size: 0.85rem;
      color: #666;
      margin-left: 8px;
    }

    /* 看板 */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
      align-items: flex-start;
    }
    .column {
      padding: 16px;
      min-height: 420px;
      background: rgba(255,255,255,0.35);
    }
    .col-title {
      font-size: 1.5rem;
      margin: 0 0 16px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 8px;
      border-bottom: 2px solid #1a1a1a;
      transform: rotate(0.4deg);
    }
    .col-count {
      font-size: 1rem;
      background: #1a1a1a;
      color: #fff;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transform: rotate(-3deg);
    }

    /* 任务卡片 */
    .task-card {
      padding: 12px;
      margin-bottom: 14px;
      cursor: grab;
      position: relative;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .task-card:hover {
      transform: rotate(-1deg) scale(1.01) translateY(-1px);
      box-shadow: 3px 4px 0 rgba(0,0,0,0.12);
    }
    .task-card.dragging {
      opacity: 0.6;
      transform: rotate(4deg) scale(1.03);
      box-shadow: 5px 6px 0 rgba(0,0,0,0.2);
    }
    .task-text {
      font-size: 1.2rem;
      line-height: 1.45;
      min-height: 26px;
      outline: none;
      word-break: break-word;
      cursor: text;
    }
    .task-text[contenteditable="true"] {
      border-bottom: 1px dashed #555;
      background: rgba(0,0,0,0.02);
    }
    .task-meta {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .task-assignees {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }
    .mini-avatar {
      width: 26px;
      height: 26px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid #1a1a1a;
      background: #fff;
      cursor: pointer;
      border-radius: 50%;
      transition: transform 0.08s;
    }
    .mini-avatar:hover {
      transform: scale(1.15);
    }
    .mini-avatar.assigned {
      background: #1a1a1a;
      color: #fff;
    }
    .task-delete {
      opacity: 0;
      cursor: pointer;
      font-size: 1.3rem;
      line-height: 1;
      transition: opacity 0.1s;
      color: #444;
      padding: 0 4px;
    }
    .task-card:hover .task-delete {
      opacity: 1;
    }
    .task-delete:hover {
      color: #900;
      transform: scale(1.2);
    }

    .add-btn {
      width: 100%;
      padding: 10px;
      text-align: center;
      background: transparent;
      border: 2px dashed #1a1a1a;
      cursor: pointer;
      font-size: 1.1rem;
      font-family: inherit;
      color: #1a1a1a;
      margin-top: 6px;
      transition: background 0.1s;
    }
    .add-btn:hover {
      background: rgba(0,0,0,0.06);
    }
    .task-input {
      width: 100%;
      padding: 10px;
      font-family: inherit;
      font-size: 1.2rem;
      border: 2px solid #1a1a1a;
      background: #fff;
      outline: none;
      margin-bottom: 14px;
    }
    .notif-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #c00;
      color: #fff;
      font-size: 0.7rem;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid #fff;
      font-family: sans-serif;
      font-weight: bold;
    }

    @media (max-width: 820px) {
      .board { grid-template-columns: 1fr; }
      header h1 { font-size: 2rem; }
      header { flex-direction: column; align-items: flex-start; }
      .login-wrap { margin-top: 6vh; padding: 20px; }
    }

    .empty-hint {
      text-align: center;
      color: #777;
      font-size: 1.1rem;
      padding: 20px 0;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <!-- 登录页 -->
  <div id="login-page" class="page active">
    <div class="login-wrap sketch-box">
      <h1>mirako</h1>
      <label>Supabase URL</label>
      <input id="sb-url" placeholder="https://xxxx.supabase.co" />
      <label>Supabase Anon Key</label>
      <input id="sb-key" placeholder="eyJhbGciOiJIUzI1NiIs..." />
      <label>邮箱</label>
      <input id="login-email" type="email" placeholder="you@example.com" />
      <button id="login-btn">发送 Magic Link 登录</button>
      <div class="login-tip">
        首次配置请在代码里填写 Supabase 信息，或临时输入。登录链接会发送到你的邮箱，点击后即可进入看板。
      </div>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- 看板页 -->
  <div id="board-page" class="page">
    <div class="container">
      <header>
        <h1>mirako</h1>
        <div class="header-right">
          <div class="members" id="membersBar"></div>
          <button class="logout-btn" id="logout-btn">退出</button>
        </div>
      </header>

      <div class="board" id="board">
        <div class="column sketch-box" data-status="todo">
          <h2 class="col-title">待办 <span class="col-count">0</span></h2>
          <div class="task-list" id="col-todo"></div>
          <button class="add-btn" onclick="startAdd('todo')">+ 新建任务</button>
        </div>
        <div class="column sketch-box-alt" data-status="doing">
          <h2 class="col-title">进行中 <span class="col-count">0</span></h2>
          <div class="task-list" id="col-doing"></div>
          <button class="add-btn" onclick="startAdd('doing')">+ 新建任务</button>
        </div>
        <div class="column sketch-box" data-status="done">
          <h2 class="col-title">已完成 <span class="col-count">0</span></h2>
          <div class="task-list" id="col-done"></div>
          <button class="add-btn" onclick="startAdd('done')">+ 新建任务</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ========== 配置区：建议直接在这里写死你的 Supabase 信息 ========== */
    const CONFIG_URL  = 'https://zfmlgakijlrtyibophbl.supabase.co';
    const CONFIG_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpmbWxnYWtpamxydHlpYm9waGJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDUzNDI2NDIsImV4cCI6MjA2MDkxODY0Mn0.E_uaDw2bmWlYXAhvHzM3bkZ3-a6g3OH0jxEDwCSBn_M';

    let sb = null;
    let user = null;
    let members = [];
    let tasks = [];
    let filterMemberId = null;
    let realtimeChannel = null;

    const DEFAULT_MEMBERS = [
      { id: 'peter',    name: 'Peter',    abbr: 'P' },
      { id: 'tamikip',  name: 'TamikiP',  abbr: 'T' },
      { id: 'luochuan', name: '落川',     abbr: '落' },
      { id: 'xiaokeng', name: '小坑酱',   abbr: '坑' }
    ];

    /* ========== 初始化 ========== */
    (async function init() {
      // 回填配置
      if (CONFIG_URL) document.getElementById('sb-url').value = CONFIG_URL;
      if (CONFIG_KEY) document.getElementById('sb-key').value = CONFIG_KEY;

      // 检查 URL 中是否有 access_token（Magic Link 回调）
      const hash = window.location.hash;
      const hasToken = hash.includes('access_token');

      // 尝试读取 localStorage 里缓存的凭据
      const savedUrl = localStorage.getItem('mirako_sb_url');
      const savedKey = localStorage.getItem('mirako_sb_key');

      if (savedUrl && savedKey) {
        sb = supabase.createClient(savedUrl, savedKey);
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
          await enterApp(session.user);
          return;
        }
      }

      // 如果是从 Magic Link 回来且 URL 带 token，Supabase 会自动处理
      // 但我们需要先创建 client 才能让它解析 hash
      if (hasToken && savedUrl && savedKey) {
        sb = supabase.createClient(savedUrl, savedKey);
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
          window.location.hash = '';
          await enterApp(session.user);
          return;
        }
      }

      showLogin();
    })();

    function showLogin() {
      document.getElementById('login-page').classList.add('active');
      document.getElementById('board-page').classList.remove('active');
    }

    function showBoard() {
      document.getElementById('login-page').classList.remove('active');
      document.getElementById('board-page').classList.add('active');
    }

    /* ========== 登录逻辑 ========== */
    document.getElementById('login-btn').addEventListener('click', async () => {
      const url = document.getElementById('sb-url').value.trim();
      const key = document.getElementById('sb-key').value.trim();
      const email = document.getElementById('login-email').value.trim();
      const errEl = document.getElementById('login-error');
      errEl.textContent = '';

      if (!url || !key || !email) {
        errEl.textContent = '请填写 Supabase URL、Key 和邮箱。';
        return;
      }

      sb = supabase.createClient(url, key);
      localStorage.setItem('mirako_sb_url', url);
      localStorage.setItem('mirako_sb_key', key);

      const { error } = await sb.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: window.location.href.split('#')[0] }
      });

      if (error) {
        errEl.textContent = '发送失败：' + error.message;
      } else {
        errEl.style.color = '#060';
        errEl.textContent = 'Magic Link 已发送，请去邮箱查收并点击链接。';
      }
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await sb.auth.signOut();
      localStorage.removeItem('mirako_sb_url');
      localStorage.removeItem('mirako_sb_key');
      location.reload();
    });

    /* ========== 进入应用 ========== */
    async function enterApp(u) {
      user = u;
      showBoard();
      await loadMembers();
      await loadTasks();
      subscribeRealtime();
      render();
    }

    async function loadMembers() {
      if (!sb) return;
      const { data, error } = await sb.from('profiles').select('*').order('name');
      if (error) {
        console.error('loadMembers error', error);
        members = DEFAULT_MEMBERS;
      } else if (data && data.length) {
        members = data.map(p => ({ id: p.id, name: p.name, abbr: p.abbr }));
      } else {
        members = DEFAULT_MEMBERS;
      }
    }

    async function loadTasks() {
      if (!sb) return;
      const { data, error } = await sb.from('tasks').select('*').order('created_at', { ascending: false });
      if (error) {
        console.error('loadTasks error', error);
      } else {
        tasks = data || [];
      }
    }

    function subscribeRealtime() {
      if (!sb) return;
      if (realtimeChannel) realtimeChannel.unsubscribe();
      realtimeChannel = sb
        .channel('public:tasks')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, payload => {
          if (payload.eventType === 'INSERT') {
            tasks.unshift(payload.new);
          } else if (payload.eventType === 'UPDATE') {
            const idx = tasks.findIndex(t => t.id === payload.new.id);
            if (idx > -1) tasks[idx] = payload.new;
          } else if (payload.eventType === 'DELETE') {
            tasks = tasks.filter(t => t.id !== payload.old.id);
          }
          render();
        })
        .subscribe();
    }

    /* ========== 渲染 ========== */
    function render() {
      ['todo','doing','done'].forEach(status => {
        const list = document.getElementById('col-' + status);
        list.innerHTML = '';
        let count = 0;

        const filtered = tasks.filter(t => {
          if (t.status !== status) return false;
          if (filterMemberId) {
            const ids = t.assignee_ids || [];
            if (!ids.includes(filterMemberId)) return false;
          }
          return true;
        });

        if (filtered.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'empty-hint';
          empty.textContent = '— 暂无任务 —';
          list.appendChild(empty);
        } else {
          filtered.forEach(task => {
            count++;
            list.appendChild(createCard(task));
          });
        }

        document.querySelector('.column[data-status="' + status + '"] .col-count').textContent = count;
      });

      const bar = document.getElementById('membersBar');
      bar.innerHTML = '';

      members.forEach(m => {
        const hasNotif = user && m.id === user.id && hasNewAssignment(m.id);
        const div = document.createElement('div');
        div.className = 'member-avatar sketch-box' + (filterMemberId === m.id ? ' active' : '');
        div.title = m.name + (user && user.id === m.id ? ' (我)' : '');
        div.innerHTML = m.abbr + (hasNotif ? '<span class="notif-badge">!</span>' : '');
        div.onclick = () => toggleFilter(m.id);
        bar.appendChild(div);
      });

      if (filterMemberId) {
        const clear = document.createElement('span');
        clear.className = 'clear-filter';
        clear.textContent = '清除筛选';
        clear.onclick = () => { filterMemberId = null; render(); };
        bar.appendChild(clear);
      }
    }

    function hasNewAssignment(memberId) {
      return tasks.some(t => {
        const ids = t.assignee_ids || [];
        return ids.includes(memberId) && t.status !== 'done';
      });
    }

    function toggleFilter(memberId) {
      filterMemberId = filterMemberId === memberId ? null : memberId;
      render();
    }

    function createCard(task) {
      const card = document.createElement('div');
      card.className = 'task-card sketch-box';
      card.draggable = true;
      card.dataset.id = task.id;

      const text = document.createElement('div');
      text.className = 'task-text';
      text.textContent = task.content || '';
      text.onclick = () => makeEditable(text, task);

      const meta = document.createElement('div');
      meta.className = 'task-meta';

      const assignees = document.createElement('div');
      assignees.className = 'task-assignees';
      members.forEach(m => {
        const ids = task.assignee_ids || [];
        const av = document.createElement('span');
        av.className = 'mini-avatar' + (ids.includes(m.id) ? ' assigned' : '');
        av.textContent = m.abbr;
        av.title = '指派给 ' + m.name;
        av.onclick = (e) => { e.stopPropagation(); toggleAssignee(task.id, m.id); };
        assignees.appendChild(av);
      });

      const del = document.createElement('span');
      del.className = 'task-delete';
      del.textContent = '×';
      del.onclick = (e) => { e.stopPropagation(); deleteTask(task.id); };

      meta.appendChild(assignees);
      meta.appendChild(del);
      card.appendChild(text);
      card.appendChild(meta);

      card.addEventListener('dragstart', e => {
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', task.id);
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
      });

      return card;
    }

    function makeEditable(el, task) {
      el.contentEditable = true;
      el.focus();
      const range = document.createRange();
      range.selectNodeContents(el);
      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);

      const commit = async () => {
        el.contentEditable = false;
        const val = el.textContent.trim();
        if (val && val !== task.content) {
          await sb.from('tasks').update({ content: val }).eq('id', task.id);
          task.content = val;
          render();
        } else if (!val) {
          el.textContent = task.content;
        }
      };

      el.onblur = commit;
      el.onkeydown = (e) => {
        if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
        if (e.key === 'Escape') { el.textContent = task.content; el.blur(); }
      };
    }

    async function startAdd(status) {
      const list = document.getElementById('col-' + status);
      const empty = list.querySelector('.empty-hint');
      if (empty) empty.remove();

      const input = document.createElement('input');
      input.className = 'task-input sketch-box';
      input.placeholder = '要做什么事？回车确认';
      list.insertBefore(input, list.firstChild);
      input.focus();

      const finish = async () => {
        const val = input.value.trim();
        if (val) {
          const { data, error } = await sb.from('tasks').insert({
            content: val,
            status: status,
            assignee_ids: [],
            created_by: user.id
          }).select().single();
          if (!error && data) {
            tasks.unshift(data);
            render();
          }
        }
        input.remove();
      };

      input.onkeydown = (e) => {
        if (e.key === 'Enter') finish();
        if (e.key === 'Escape') input.remove();
      };
      input.onblur = () => {
        setTimeout(() => {
          if (input.parentNode) finish();
        }, 150);
      };
    }

    async function toggleAssignee(taskId, memberId) {
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;
      let ids = Array.isArray(task.assignee_ids) ? [...task.assignee_ids] : [];
      const idx = ids.indexOf(memberId);
      if (idx > -1) ids.splice(idx, 1);
      else ids.push(memberId);

      const { error } = await sb.from('tasks').update({ assignee_ids: ids }).eq('id', taskId);
      if (!error) {
        task.assignee_ids = ids;
        render();
      }
    }

    async function deleteTask(id) {
      await sb.from('tasks').delete().eq('id', id);
      tasks = tasks.filter(t => t.id !== id);
      render();
    }

    /* 拖拽放置 */
    document.querySelectorAll('.column').forEach(col => {
      col.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        col.style.background = 'rgba(0,0,0,0.05)';
      });
      col.addEventListener('dragleave', () => {
        col.style.background = 'rgba(255,255,255,0.35)';
      });
      col.addEventListener('drop', async e => {
        e.preventDefault();
        col.style.background = 'rgba(255,255,255,0.35)';
        const id = e.dataTransfer.getData('text/plain');
        const task = tasks.find(t => t.id === id);
        const newStatus = col.dataset.status;
        if (task && task.status !== newStatus) {
          const { error } = await sb.from('tasks').update({ status: newStatus }).eq('id', id);
          if (!error) {
            task.status = newStatus;
            render();
          }
        }
      });
    });
  </script>
</body>
</html>
